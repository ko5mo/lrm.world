<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASCII Surfer Wave</title>
  <style>
    :root {
      color-scheme: light;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #e6eef3;
      color: #0f172a;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .frame {
      width: min(100%, 1100px);
      margin: 0 auto;
      padding: 1rem;
      box-sizing: border-box;
    }

    canvas {
      width: 100%;
      height: min(72vh, 640px);
      display: block;
      border-radius: 10px;
      background: #e8f0f6;
      box-shadow:
        0 0 0 1px rgba(15, 23, 42, 0.18) inset,
        0 12px 30px rgba(15, 23, 42, 0.12);
    }

    .hint {
      opacity: 0.78;
      font-size: 0.86rem;
      margin-top: 0.55rem;
      text-align: right;
    }
  </style>
</head>
<body>
  <main class="frame">
    <canvas id="ascii-ocean" aria-label="Animated ASCII surfer on a breaking ocean wave"></canvas>
    <div class="hint">ASCII surfer • inspired by the provided wave-riding GIF</div>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('ascii-ocean');
      const ctx = canvas.getContext('2d');

      const waterRamp = ' .,:-~!=+*#%@';
      const foamRamp = " .`'^\",:;i!lI?[]{}()1tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";

      const state = {
        dpr: Math.max(1, Math.min(2, window.devicePixelRatio || 1)),
        cols: 0,
        rows: 0,
        cellW: 10,
        cellH: 14,
        width: 0,
        height: 0,
        time: 0
      };

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.floor(rect.width * state.dpr);
        canvas.height = Math.floor(rect.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

        state.width = rect.width;
        state.height = rect.height;
        state.cols = Math.max(42, Math.floor(rect.width / state.cellW));
        state.rows = Math.max(18, Math.floor(rect.height / state.cellH));

        ctx.font = `${state.cellH}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace`;
        ctx.textBaseline = 'top';
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function sampleWave(nx, t) {
        const swell = Math.sin(nx * 6.4 - t * 0.9) * 0.04;
        const shoulder = Math.sin(nx * 13.5 + t * 1.3) * 0.016;
        const chop = Math.sin(nx * 39.0 - t * 5.2) * 0.008;

        const base = 0.24 + swell + shoulder + chop;

        // A curling section in the left-middle frame, matching the surf shot composition.
        const curlCenter = 0.34 + Math.sin(t * 0.4) * 0.02;
        const curl = Math.exp(-Math.pow((nx - curlCenter) / 0.16, 2)) * 0.17;

        // Whitewater exploding to the right.
        const breakerEdge = 0.48 + Math.sin(t * 0.7) * 0.03;
        const rightBlast = nx > breakerEdge ? Math.pow((nx - breakerEdge) / 0.52, 0.55) * 0.22 : 0;

        return base + curl + rightBlast;
      }

      function surferPose(t) {
        const cycle = Math.sin(t * 2.1);
        return {
          x: 0.56 + Math.sin(t * 0.85) * 0.04,
          yOffset: 0.03 + Math.cos(t * 1.8) * 0.012,
          lean: cycle * 0.7,
          arm: Math.sin(t * 3.2) * 0.8
        };
      }

      function drawSurfer(gx, gy, pose) {
        const px = gx * state.cellW;
        const py = gy * state.cellH;
        const tilt = pose.lean;

        // Board
        ctx.fillStyle = 'rgba(18, 52, 86, 0.85)';
        ctx.fillText('__', px - state.cellW * 1.2, py + state.cellH * 1.3);
        ctx.fillText('~', px + state.cellW * 0.8, py + state.cellH * 1.2);

        // Legs / wetsuit
        ctx.fillStyle = 'rgba(31, 41, 55, 0.95)';
        ctx.fillText('/', px - state.cellW * 0.15, py + state.cellH * 0.62 + tilt);
        ctx.fillText('\\', px + state.cellW * 0.32, py + state.cellH * 0.78 - tilt * 0.6);

        // Torso (red rashguard)
        ctx.fillStyle = 'rgba(190, 24, 93, 0.9)';
        ctx.fillText('##', px - state.cellW * 0.08, py + state.cellH * 0.08);

        // Head
        ctx.fillStyle = 'rgba(120, 113, 108, 0.9)';
        ctx.fillText('o', px + state.cellW * 0.1, py - state.cellH * 0.45);

        // Back arm trailing
        ctx.fillStyle = 'rgba(156, 163, 175, 0.85)';
        const armChar = pose.arm > 0 ? '--' : '__';
        ctx.fillText(armChar, px + state.cellW * 0.95, py + state.cellH * 0.25);
      }

      function draw(ts) {
        const t = ts * 0.001;
        state.time = t;

        ctx.clearRect(0, 0, state.width, state.height);

        const horizon = 0.18;
        const pose = surferPose(t);

        for (let y = 0; y < state.rows; y++) {
          const ny = y / state.rows;

          for (let x = 0; x < state.cols; x++) {
            const nx = x / state.cols;
            const waveY = sampleWave(nx, t);
            const depth = ny - (horizon + waveY);

            if (depth < -0.05) {
              // sky gradient + subtle grain
              if (Math.random() < 0.0007) {
                ctx.fillStyle = 'rgba(30, 64, 175, 0.22)';
                ctx.fillText('.', x * state.cellW, y * state.cellH);
              }
              continue;
            }

            const curlBand = Math.exp(-Math.pow((nx - 0.34) / 0.18, 2));
            const foamBand = clamp(0.12 - Math.abs(depth), 0, 1);
            const splash = clamp((nx - 0.5) * 2.2, 0, 1) * Math.max(0, 0.08 - depth) * 2.8;

            const ripple =
              Math.sin(nx * 100 - t * 8 + ny * 22) * 0.5 +
              Math.sin(nx * 40 + t * 3 - ny * 12) * 0.5;

            const waterEnergy = clamp(0.18 + (0.2 - depth) * 1.25 + ripple * 0.13, 0, 1);
            const foamEnergy = clamp(foamBand * (0.55 + curlBand * 0.85) + splash, 0, 1);

            if (foamEnergy > 0.26) {
              const i = Math.floor(foamEnergy * (foamRamp.length - 1));
              const ch = foamRamp[i];
              const alpha = clamp(0.3 + foamEnergy * 0.7, 0, 0.96);
              const shade = Math.floor(lerp(230, 255, foamEnergy));
              ctx.fillStyle = `rgba(${shade}, ${shade}, ${shade}, ${alpha})`;
              ctx.fillText(ch, x * state.cellW, y * state.cellH);
            } else {
              const i = Math.floor(waterEnergy * (waterRamp.length - 1));
              const ch = waterRamp[i];
              const g = Math.floor(lerp(130, 205, waterEnergy));
              const b = Math.floor(lerp(165, 235, waterEnergy));
              const alpha = clamp(0.35 + waterEnergy * 0.58, 0, 0.95);
              ctx.fillStyle = `rgba(23, ${g}, ${b}, ${alpha})`;
              ctx.fillText(ch, x * state.cellW, y * state.cellH);
            }
          }
        }

        // Render surfer near the shoulder of the wave.
        const surferX = clamp(pose.x, 0.1, 0.9);
        const surferY = horizon + sampleWave(surferX, t) + pose.yOffset;
        drawSurfer(surferX * state.cols, surferY * state.rows, pose);

        requestAnimationFrame(draw);
      }

      const ro = new ResizeObserver(resize);
      ro.observe(canvas);
      resize();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
