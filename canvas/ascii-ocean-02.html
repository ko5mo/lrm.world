<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASCII Ocean Waves</title>
  <style>
    :root { color-scheme: light; }

    html, body {
      height: 100%;
      margin: 0;
      background: #eaeaea;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .frame {
      width: min(100%, 1000px);
      margin: 0 auto;
      padding: 1rem;
      box-sizing: border-box;
    }

    canvas {
      width: 100%;
      height: min(68vh, 560px);
      display: block;
      border-radius: 8px;
      background: #eaeaea;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2) inset;
    }

    .hint {
      opacity: 0.8;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: right;
    }
  </style>
</head>
<body>
  <main class="frame">
    <canvas id="ascii-ocean" aria-label="Animated ASCII crashing ocean waves"></canvas>
    <div class="hint">ASCII ocean • energetic rolling sets</div>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('ascii-ocean');
      const ctx = canvas.getContext('2d');
      const chars = '   ..,:;!i1tfLCG08#@';

      const state = {
        cols: 0,
        rows: 0,
        cellW: 9,
        cellH: 13,
        dpr: Math.max(1, Math.min(2, window.devicePixelRatio || 1)),
        time: 0
      };

      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const smooth = (a, b, x) => {
        const t = clamp((x - a) / (b - a), 0, 1);
        return t * t * (3 - 2 * t);
      };

      const noise = (x, y, t) => {
        const n1 = Math.sin(x * 7.3 + y * 4.7 + t * 6.1);
        const n2 = Math.sin(x * 17.9 - y * 11.3 - t * 9.2);
        return (n1 + n2) * 0.5;
      };

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.floor(rect.width * state.dpr);
        canvas.height = Math.floor(rect.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

        state.cols = Math.max(28, Math.floor(rect.width / state.cellW));
        state.rows = Math.max(16, Math.floor(rect.height / state.cellH));

        ctx.font = '13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
        ctx.textBaseline = 'top';
      }

      function waveBands(nx, ny, t) {
        const perspective = Math.pow(ny, 1.35);

        const backSet = Math.sin(nx * 9.0 - t * 2.2 + ny * 8.5) * 0.5 + 0.5;
        const midSet = Math.sin(nx * 6.2 - t * 3.0 + ny * 13.0) * 0.5 + 0.5;
        const frontSet = Math.sin(nx * 4.0 - t * 4.2 + ny * 20.0) * 0.5 + 0.5;

        const rearBand = smooth(0.28, 0.58, backSet) * smooth(0.18, 0.38, ny) * (1 - smooth(0.46, 0.68, ny));
        const midBand = smooth(0.40, 0.70, midSet) * smooth(0.34, 0.58, ny) * (1 - smooth(0.70, 0.88, ny));
        const frontBand = smooth(0.48, 0.78, frontSet) * smooth(0.54, 0.95, ny);

        const foamRear = smooth(0.58, 0.94, backSet) * rearBand;
        const foamMid = smooth(0.62, 0.95, midSet) * midBand;
        const foamFront = smooth(0.66, 0.97, frontSet) * frontBand;

        return {
          rearBand: rearBand * (0.7 + perspective * 0.3),
          midBand: midBand * (0.8 + perspective * 0.4),
          frontBand: frontBand * (0.9 + perspective * 0.6),
          foam: foamRear * 0.7 + foamMid + foamFront * 1.2
        };
      }

      function draw(ts) {
        state.time = ts * 0.001;
        const t = state.time;
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

        const horizon = 0.24 + Math.sin(t * 0.7) * 0.008;

        for (let y = 0; y < state.rows; y++) {
          const ny = y / state.rows;

          for (let x = 0; x < state.cols; x++) {
            const nx = x / state.cols;
            const sea = waveBands(nx, ny, t);

            const chop = (Math.sin(nx * 26 - t * 8.2 + ny * 20) * 0.5 + 0.5) * smooth(0.45, 1, ny);
            const streaks = (Math.sin(nx * 40 + ny * 6 - t * 5.4) * 0.5 + 0.5) * smooth(0.58, 1, ny);
            const gust = (Math.sin((nx + ny) * 17 - t * 10.5) * 0.5 + 0.5) * 0.25;

            const skyMask = 1 - smooth(horizon - 0.02, horizon + 0.01, ny);
            const seaMask = smooth(horizon - 0.01, horizon + 0.05, ny);

            let darkness = 0;
            darkness += sea.rearBand * 0.72;
            darkness += sea.midBand * 0.95;
            darkness += sea.frontBand * 1.12;
            darkness += chop * 0.35;
            darkness += streaks * 0.3;
            darkness += gust;
            darkness += noise(nx * 1.3, ny * 1.1, t) * 0.08;

            // Cut bright foam lanes through darker wave bands.
            darkness -= sea.foam * 0.95;

            if (skyMask > 0.5) {
              const spray = sea.foam * 0.2 + (Math.random() < 0.0009 ? 0.18 : 0);
              darkness = clamp(spray, 0, 0.35);
            } else {
              darkness *= seaMask;
            }

            darkness = clamp(darkness, 0, 1);
            const i = Math.floor(darkness * (chars.length - 1));
            const ch = chars[i];
            const alpha = 0.1 + darkness * 0.9;

            ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
            ctx.fillText(ch, x * state.cellW, y * state.cellH);
          }
        }

        requestAnimationFrame(draw);
      }

      const ro = new ResizeObserver(resize);
      ro.observe(canvas);
      resize();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
