<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASCII Ocean Waves</title>
  <style>
    :root { color-scheme: light; }

    html, body {
      height: 100%;
      margin: 0;
      background: #eaeaea;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .frame {
      width: min(100%, 1000px);
      margin: 0 auto;
      padding: 1rem;
      box-sizing: border-box;
    }

    canvas {
      width: 100%;
      height: min(68vh, 560px);
      display: block;
      border-radius: 8px;
      background: #eaeaea;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2) inset;
    }

    .hint {
      opacity: 0.8;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: right;
    }
  </style>
</head>
<body>
  <main class="frame">
    <canvas id="ascii-ocean" aria-label="Animated ASCII crashing ocean waves"></canvas>
    <div class="hint">ASCII ocean • higher contrast barrel wave</div>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('ascii-ocean');
      const ctx = canvas.getContext('2d');
      const chars = '   ..,:;!i1tfLCG0W8#@';

      const state = {
        cols: 0,
        rows: 0,
        cellW: 9,
        cellH: 13,
        dpr: Math.max(1, Math.min(2, window.devicePixelRatio || 1)),
        time: 0
      };

      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const smooth = (a, b, x) => {
        const t = clamp((x - a) / (b - a), 0, 1);
        return t * t * (3 - 2 * t);
      };

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.floor(rect.width * state.dpr);
        canvas.height = Math.floor(rect.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

        state.cols = Math.max(24, Math.floor(rect.width / state.cellW));
        state.rows = Math.max(14, Math.floor(rect.height / state.cellH));

        ctx.font = '13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
        ctx.textBaseline = 'top';
      }

      function waveHeight(x, t) {
        const swell = Math.sin(x * 0.16 + t * 0.9) * 0.9;
        const chop = Math.sin(x * 0.64 - t * 2.0) * 0.3;
        const set = Math.sin(x * 0.04 - t * 0.35) * 0.8;
        return swell + chop + set;
      }

      function draw(ts) {
        state.time = ts * 0.001;
        const t = state.time;
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

        const cx = 0.33 + Math.sin(t * 0.3) * 0.02;
        const cy = 0.55 + Math.sin(t * 0.45) * 0.01;
        const r = 0.28;

        for (let y = 0; y < state.rows; y++) {
          const ny = y / state.rows;
          const horizon = 0.23;

          for (let x = 0; x < state.cols; x++) {
            const nx = x / state.cols;
            const surface = horizon + 0.09 * waveHeight(x, t);
            const depth = ny - surface;

            const dx = (nx - cx) / 0.9;
            const dy = (ny - cy) / 1.05;
            const dist = Math.hypot(dx, dy);

            const ring = 1 - smooth(0.01, 0.09, Math.abs(dist - r));
            const tubeShadow = smooth(0.08, 0.45, dist) * smooth(0.16, 0.52, ny);
            const lip = smooth(cy - 0.18, cy - 0.03, ny) * smooth(cx - 0.08, cx + 0.22, nx);

            const waterBody = clamp(1 - depth * 2.8, 0, 1);
            const deepWall = clamp((nx - cx + 0.18) * 1.9, 0, 1) * smooth(cy - 0.05, 0.98, ny);
            const turbulence = (Math.sin((x + y) * 0.6 - t * 8.0) * 0.5 + 0.5) * 0.25;

            let darkness = 0;
            darkness += waterBody * 0.6;
            darkness += deepWall * 0.95;
            darkness += tubeShadow * 0.8;
            darkness += ring * 0.55;
            darkness += turbulence;

            const foam = ring * (Math.sin(t * 8 + x * 0.42) * 0.5 + 0.5) * 0.8 + lip * 0.4;
            darkness -= foam * 0.45;

            if (depth < -0.06) {
              const mist = ring * 0.3 + (Math.random() < 0.0007 ? 0.22 : 0);
              darkness = clamp(mist, 0, 0.32);
            }

            darkness = clamp(darkness, 0, 1);
            const i = Math.floor(darkness * (chars.length - 1));
            const ch = chars[i];
            const alpha = 0.1 + darkness * 0.9;

            ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
            ctx.fillText(ch, x * state.cellW, y * state.cellH);
          }
        }

        requestAnimationFrame(draw);
      }

      const ro = new ResizeObserver(resize);
      ro.observe(canvas);
      resize();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
