<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASCII Ocean Surfer</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      height: 100%;
      margin: 0;
      background: #eaeaea;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .frame {
      width: min(100%, 1080px);
      margin: 0 auto;
      padding: 1rem;
      box-sizing: border-box;
    }
    canvas {
      width: 100%;
      height: min(72vh, 620px);
      display: block;
      border-radius: 8px;
      background: #eaeaea;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2) inset;
    }
    .hint {
      opacity: 0.8;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: right;
    }
  </style>
</head>
<body>
  <main class="frame">
    <canvas id="ascii-ocean" aria-label="Animated ASCII rolling crashing ocean waves and surfer"></canvas>
    <div class="hint">ASCII surf • looping action cam energy</div>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('ascii-ocean');
      const ctx = canvas.getContext('2d');
      const chars = '    ...,,::;;ii11ttffLLCCGG00##@@';

      const state = {
        cols: 0,
        rows: 0,
        cellW: 8.6,
        cellH: 12.4,
        dpr: Math.max(1, Math.min(2, window.devicePixelRatio || 1)),
        time: 0
      };

      const LOOP = 6.0;
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const smooth = (a, b, x) => {
        const t = clamp((x - a) / (b - a), 0, 1);
        return t * t * (3 - 2 * t);
      };
      const mix = (a, b, t) => a + (b - a) * t;
      const lsin = (u, f, ph = 0) => Math.sin((u * Math.PI * 2 * f) + ph);

      function fisheye(nx, ny, u) {
        const cx = 0.52 + lsin(u, 0.25, 0.9) * 0.025;
        const cy = 0.56 + lsin(u, 0.2, 2.2) * 0.02;
        const dx = nx - cx;
        const dy = ny - cy;
        const r2 = dx * dx + dy * dy;
        const k = 1 + 1.1 * r2; // quadratic optic
        return { x: cx + dx * k, y: cy + dy * k };
      }

      function waveFaceY(x, u) {
        const h = 0.50 + lsin(u, 0.5, 0.7) * 0.13;
        const a = -2.1 + lsin(u, 0.33, 1.8) * 0.65;
        const k = 0.24 + lsin(u, 0.66, 0.5) * 0.045;
        return a * (x - h) * (x - h) + k;
      }

      function chop(x, y, u) {
        return (
          Math.sin(x * 40 + y * 8 - u * Math.PI * 2 * 9.0) +
          Math.sin(x * 22 - y * 16 - u * Math.PI * 2 * 6.2) +
          Math.sin((x * x * 48 + y * 28) - u * Math.PI * 2 * 11.5)
        ) / 3;
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.floor(rect.width * state.dpr);
        canvas.height = Math.floor(rect.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        state.cols = Math.max(44, Math.floor(rect.width / state.cellW));
        state.rows = Math.max(24, Math.floor(rect.height / state.cellH));
        ctx.font = '12.4px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
        ctx.textBaseline = 'top';
      }

      function draw(ts) {
        state.time = ts * 0.001;
        const t = state.time;
        const u = (t % LOOP) / LOOP; // hard loop
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

        const burst = Math.pow(lsin(u, 1.0, 0.2) * 0.5 + 0.5, 1.8);
        const speed = lsin(u, 2.0, 1.1) * 0.5 + 0.5;

        const tubeX = 0.56 + lsin(u, 0.75, 1.7) * 0.06;
        const tubeY = 0.48 + lsin(u, 1.1, 2.1) * 0.04;
        const rx = 0.18 + lsin(u, 1.3, 0.5) * 0.04;
        const ry = 0.22 + lsin(u, 0.9, 2.6) * 0.05;

        // Surfer rides a dynamic S-line across the face.
        const surferX = 0.22 + u * 0.56 + lsin(u, 2.8, 0.4) * 0.03;
        const surferY = waveFaceY(surferX, u) + 0.17 + lsin(u, 3.1, 1.2) * 0.02;

        for (let y = 0; y < state.rows; y++) {
          const ny = y / state.rows;
          for (let x = 0; x < state.cols; x++) {
            const nx = x / state.cols;

            const fish = fisheye(nx, ny, u);
            const c = chop(nx, ny, u);
            const wx = fish.x + c * 0.03 + ny * 0.02;
            const wy = fish.y + chop(nx * 0.7, ny * 1.4, u) * 0.024;

            const crest = waveFaceY(wx, u);
            const dCrest = wy - crest;

            const px = (wx - tubeX) / rx;
            const py = (wy - tubeY) / ry;
            const ang = Math.atan2(py, px);
            const d = Math.hypot(px, py) * (1 + 0.15 * Math.sin(ang * 3 + u * Math.PI * 2 * 4));

            const opening = 1 - smooth(0.60 - burst * 0.12, 1.02, d);
            const ring = 1 - smooth(0.02, 0.17, Math.abs(d - 1));
            const face = smooth(0.06, 0.99, wx) * smooth(0.16, 1.0, wy);
            const wall = smooth(0.40, 1.0, wy);
            const lip = smooth(-0.03, 0.11 + burst * 0.05, dCrest) * smooth(0.08, 0.95, wx);

            const streamA = Math.sin(wx * 45 + wy * 11 - u * Math.PI * 2 * 12.0) * 0.5 + 0.5;
            const streamB = Math.sin(wx * 24 - wy * 18 - u * Math.PI * 2 * 9.0) * 0.5 + 0.5;

            let dark = 0;
            dark += face * 0.82;
            dark += wall * 1.02;
            dark += lip * (0.66 + speed * 0.46);
            dark += ring * 0.72;
            dark += streamA * 0.38;
            dark += streamB * 0.34;

            const whitewater = smooth(0.55, 0.98, streamA) * smooth(-0.03, 0.2, dCrest) * (0.68 + speed * 0.9);
            const spray = smooth(-0.11, 0.03, dCrest) * smooth(0.22, 1.0, wx)
              * (Math.sin(wx * 60 - u * Math.PI * 2 * 16 + wy * 10) * 0.5 + 0.5);
            const wash = smooth(0.58, 1.0, wy) * (Math.sin(wx * 21 - u * Math.PI * 2 * 10 + wy * 7) * 0.5 + 0.5);

            dark -= opening * (1.16 + burst * 0.78);
            dark -= whitewater * 1.07;
            dark -= spray * 0.9;
            dark -= wash * 0.44;

            const sweep = 1 - smooth(((u * 1.25) % 1.2) - 0.12, ((u * 1.25) % 1.2) + 0.04, wx + wy * 0.16);
            dark = mix(dark, dark - 0.50 - whitewater * 0.35, sweep * (0.24 + speed * 0.45));

            if (dCrest < -0.12 && wy < 0.52) {
              const spark = Math.random() < (0.0014 + speed * 0.0022) ? 0.24 : 0.03;
              dark = mix(dark, spark, 0.88);
            }

            // Surfer silhouette.
            const bx = (wx - surferX) / 0.048;
            const by = (wy - (surferY + 0.02)) / 0.012;
            const board = bx * bx + by * by;
            const hx = (wx - surferX) / 0.022;
            const hy = (wy - surferY) / 0.028;
            const body = hx * hx + hy * hy;
            if (body < 1 || board < 1) dark = clamp(dark + 0.68, 0, 1);

            dark = clamp(dark, 0, 1);
            let glyph = chars[Math.floor(dark * (chars.length - 1))];
            if (body < 0.5) glyph = '@';
            else if (board < 0.7) glyph = '=';

            ctx.fillStyle = `rgba(0, 0, 0, ${0.07 + dark * 0.93})`;
            ctx.fillText(glyph, x * state.cellW, y * state.cellH);
          }
        }

        requestAnimationFrame(draw);
      }

      const ro = new ResizeObserver(resize);
      ro.observe(canvas);
      resize();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
